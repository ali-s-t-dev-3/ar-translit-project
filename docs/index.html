<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="A browser version of the original Tkinter Arabic Transliteration Tool."
    >
    <title>Arabic Transliteration Tool</title>
    <link rel="stylesheet" href="./styles.css">
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <main class="page-shell">
      <section class="tk-window" aria-label="Arabic Transliteration Tool">
        <div class="tk-titlebar" aria-hidden="true">
          <span class="tk-icon">◒</span>
          <span class="tk-title">Arabic Transliteration Tool</span>
          <span class="tk-controls">– □ ×</span>
        </div>

        <div class="tk-body">
          <label class="tk-label" for="latin-input">Enter Arabic word transliterated in Latin:</label>
          <input
            id="latin-input"
            class="tk-input"
            type="text"
            autocomplete="off"
            spellcheck="false"
            autofocus
          >

          <p class="tk-error" id="error" role="status"></p>

          <label class="tk-label" for="arabic-output">Output (Arabic):</label>
          <output class="tk-output" id="arabic-output" dir="rtl" lang="ar"></output>

          <label class="tk-label" for="suggestions">Suggestions:</label>
          <output class="tk-output" id="suggestions" dir="rtl" lang="ar"></output>

          <label class="tk-label" for="prediction">Predicted next word:</label>
          <output class="tk-output" id="prediction" dir="rtl" lang="ar"></output>
        </div>
      </section>

    </main>
  </body>
</html>
